<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Request Form - SAT Brothers</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-container">
            <div class="logo-section">
                <img src="logo.png" alt="SAT Brothers Logo" class="logo">
                <h1>SAT Brothers</h1>
            </div>
            <nav class="navbar">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="philosophy.html">Our Approach</a></li>
                    <li><a href="packages.html">Packages & Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Contact Form Section -->
    <section class="form-section">
        <div class="form-container">
            <h2>Custom Tutoring Request</h2>
            <p>Tell us about your specific tutoring needs and goals.</p>
            
            <form class="contact-form" action="#" method="POST">
                <div class="form-group">
                    <label for="parent-name">Parent/Guardian Name *</label>
                    <input type="text" id="parent-name" name="parent-name" required>
                </div>

                <div class="form-group">
                    <label for="student-name">Student Name *</label>
                    <input type="text" id="student-name" name="student-name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address *</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone">
                </div>

                <div class="form-group">
                    <label for="current-score">Current SAT Score (if available)</label>
                    <input type="text" id="current-score" name="current-score">
                </div>

                <div class="form-group">
                    <label for="target-score">Target SAT Score *</label>
                    <input type="text" id="target-score" name="target-score" required>
                </div>

                <div class="form-group">
                    <label for="timeline">Timeline for Improvement *</label>
                    <select id="timeline" name="timeline" required>
                        <option value="">Select a timeline</option>
                        <option value="3-months">3 months or less</option>
                        <option value="6-months">6 months</option>
                        <option value="12-months">12 months</option>
                        <option value="flexible">Flexible</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="weak-areas">Areas of Weakness or Concern</label>
                    <textarea id="weak-areas" name="weak-areas" rows="4" placeholder="Tell us about specific areas where your student needs help..."></textarea>
                </div>

                <div class="form-group">
                    <label for="additional-info">Additional Information or Special Requests</label>
                    <textarea id="additional-info" name="additional-info" rows="4" placeholder="Any other details we should know?"></textarea>
                </div>

                <button type="submit" class="submit-button">Submit Request</button>
            </form>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 SAT Brothers. All rights reserved.</p>
    </footer>
</body>
</html>
